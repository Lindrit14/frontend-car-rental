server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: every unknown route returns index.html so the
    # React Router can take over on the client.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed assets emitted by Vite.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
